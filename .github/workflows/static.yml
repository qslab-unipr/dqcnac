name: Deploy Sphinx to GitHub Pages

on:
  push:
    branches: [ docs_pages, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'  # Stable, avoids numpy 3.14 issues

    - name: Setup mocks + Sphinx
      run: |
        pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme
        pip install numpy networkx qiskit pymetis

    - name: Build Sphinx
      run: |
        sphinx-apidoc -f -o docs/source/api dqcnac/ -e -M
        cd docs/
        make clean html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
